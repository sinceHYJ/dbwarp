  # 自动配置主从复制
  replication-init:
    image: mysql:8.0
    container_name: dbwarp-replication-init
    volumes:
      - ./init-replication.sh:/init-replication.sh:ro
      - ./init:/init:ro
    command: ["bash", "/init-replication.sh"]
    depends_on:
      mysql-1-slave:
        condition: service_healthy
      mysql-2-slave:
        condition: service_healthy
      mysql-3-slave:
        condition: service_healthy
      mysql-4-slave:
        condition: service_healthy

  # 单库（无主从），用于测试 Photo 表
  mysql-photo:
    image: mysql:8.0
    container_name: dbwarp-mysql-photo
    restart: unless-stopped
    ports:
      - "3315:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: test_db
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test123
    volumes:
      - mysql-photo-data:/var/lib/mysql
      - ./init/init-photo.sql:/docker-entrypoint-initdb.d/init-photo.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
